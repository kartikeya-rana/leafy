<svg viewBox="0 0 1600 1070" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="1600" height="1070" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F2421"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2F6B3C"/>
    </marker>
  </defs>

  <!-- node style: fill #EDE9FE, stroke #8B7FD6 -->

  <!-- You -->
  <circle cx="800" cy="90" r="34" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="800" y="96" text-anchor="middle" font-size="15" fill="#1F2421">You</text>

  <!-- Dashboard + chat -->
  <rect x="700" y="168" width="200" height="56" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="800" y="201" text-anchor="middle" font-size="15" fill="#1F2421">Dashboard + chat</text>

  <!-- Security screen -->
  <rect x="622" y="270" width="356" height="80" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="800" y="300" text-anchor="middle" font-size="15" fill="#1F2421">Security screen</text>
  <text x="800" y="322" text-anchor="middle" font-size="13.5" fill="#1F2421">prompt-injection · PII</text>
  <text x="800" y="340" text-anchor="middle" font-size="13.5" fill="#1F2421">redaction · image checks</text>

  <!-- Leafy orchestrator -->
  <rect x="662" y="396" width="276" height="66" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="800" y="435" text-anchor="middle" font-size="16" fill="#1F2421">🌿 Leafy orchestrator</text>
  <text x="800" y="454" text-anchor="middle" font-size="13.5" fill="#55606A">(Gemini)</text>

  <!-- spine arrows -->
  <g stroke="#1F2421" stroke-width="1.5" fill="none">
    <path d="M800,124 L800,166" marker-end="url(#arrow)"/>
    <path d="M800,224 L800,268" marker-end="url(#arrow)"/>
    <path d="M800,350 L800,394" marker-end="url(#arrow)"/>
  </g>

  <!-- Row of five tools/capabilities -->
  <!-- Shelter advisor -->
  <rect x="128" y="720" width="220" height="66" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="238" y="748" text-anchor="middle" font-size="14.5" fill="#1F2421">Shelter advisor</text>
  <text x="238" y="768" text-anchor="middle" font-size="13" fill="#55606A">(deterministic)</text>

  <!-- catalogue + profile tools -->
  <rect x="452" y="720" width="234" height="66" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="569" y="759" text-anchor="middle" font-size="14.5" fill="#1F2421">catalogue + profile tools</text>

  <!-- watering_reasoner -->
  <rect x="790" y="720" width="230" height="66" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="905" y="748" text-anchor="middle" font-size="14.5" fill="#1F2421">watering_reasoner</text>
  <text x="905" y="768" text-anchor="middle" font-size="13" fill="#55606A">specialist sub-agent</text>

  <!-- Spot / Light Check -->
  <rect x="1124" y="720" width="230" height="66" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="1239" y="748" text-anchor="middle" font-size="14.5" fill="#1F2421">Spot / Light Check</text>
  <text x="1239" y="768" text-anchor="middle" font-size="13" fill="#55606A">(vision + deterministic)</text>

  <!-- geocode -->
  <rect x="1400" y="720" width="150" height="66" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="1475" y="759" text-anchor="middle" font-size="14.5" fill="#1F2421">geocode</text>

  <!-- orchestrator -> five children (curved fan-out) -->
  <g stroke="#1F2421" stroke-width="1.4" fill="none">
    <path d="M672,458 C420,480 260,560 238,718" marker-end="url(#arrow)"/>
    <path d="M700,462 C620,520 585,600 569,718" marker-end="url(#arrow)"/>
    <path d="M790,462 L870,718" marker-end="url(#arrow)"/>
    <path d="M900,462 C1000,540 1150,600 1235,718" marker-end="url(#arrow)"/>
    <path d="M938,458 C1200,485 1420,560 1475,718" marker-end="url(#arrow)"/>
  </g>

  <!-- direct orchestrator -> Weather MCP server (the fix: watering advice fetches live weather directly, not only via Shelter) -->
  <path d="M668,442 C320,462 50,560 62,858" stroke="#2F6B3C" stroke-width="2.2" stroke-dasharray="7 4" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- second row: data + external -->
  <!-- Weather MCP server -->
  <rect x="18" y="862" width="220" height="66" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="128" y="890" text-anchor="middle" font-size="14.5" fill="#1F2421">Weather MCP server</text>
  <text x="128" y="910" text-anchor="middle" font-size="13" fill="#55606A">(separate process)</text>

  <!-- SQLite cylinder -->
  <ellipse cx="569" cy="874" rx="46" ry="12" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <path d="M523,874 L523,912 A46,12 0 0 0 615,912 L615,874" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="569" y="900" text-anchor="middle" font-size="13.5" fill="#1F2421">SQLite</text>

  <!-- plants.json cylinder (shared by watering_reasoner and spot/light) -->
  <ellipse cx="1060" cy="874" rx="60" ry="12" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <path d="M1000,874 L1000,912 A60,12 0 0 0 1120,912 L1120,874" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="1060" y="900" text-anchor="middle" font-size="13.5" fill="#1F2421">plants.json</text>

  <!-- Open-Meteo geocoding -->
  <rect x="1390" y="862" width="180" height="60" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="1480" y="897" text-anchor="middle" font-size="13.5" fill="#1F2421">Open-Meteo geocoding</text>

  <!-- edges from tool row down to data row -->
  <g stroke="#1F2421" stroke-width="1.4" fill="none">
    <path d="M238,786 L160,860" marker-end="url(#arrow)"/>
    <path d="M569,786 L569,850" marker-end="url(#arrow)"/>
    <path d="M905,786 L1030,850" marker-end="url(#arrow)"/>
    <path d="M1239,786 L1090,850" marker-end="url(#arrow)"/>
    <path d="M1475,786 L1480,860" marker-end="url(#arrow)"/>
  </g>

  <!-- Open-Meteo forecast (under Weather MCP) -->
  <rect x="18" y="970" width="220" height="34" rx="8" fill="#EDE9FE" stroke="#8B7FD6" stroke-width="1.5"/>
  <text x="128" y="992" text-anchor="middle" font-size="13.5" fill="#1F2421">Open-Meteo forecast</text>
  <path d="M128,928 L128,968" stroke="#1F2421" stroke-width="1.4" fill="none" marker-end="url(#arrow)"/>

  <!-- legend for the new edge, centered under the whole diagram to avoid clipping -->
  <g font-size="13.5" fill="#2F6B3C">
    <path d="M560,1040 L610,1040" stroke="#2F6B3C" stroke-width="2.2" stroke-dasharray="7 4"/>
    <text x="618" y="1044">Leafy also fetches live weather directly — this is what powers the Watering Advisor</text>
  </g>
</svg>

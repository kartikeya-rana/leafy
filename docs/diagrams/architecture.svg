<svg viewBox="0 0 1040 792" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <rect width="1040" height="792" fill="#F7F6F1"/>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4E8B5B"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9AA4AC"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="40" y="46" font-size="26" font-weight="700" fill="#2F6B3C">Leafy — System Architecture</text>
  <text x="40" y="70" font-size="14" fill="#6B7280">LLM-orchestrated plant-care agent · Google ADK 2.0 · Gemini</text>

  <!-- legend -->
  <g font-size="12" fill="#1F2421">
    <rect x="712" y="30" width="14" height="14" rx="3" fill="#E9F2EA" stroke="#2F6B3C"/>
    <text x="732" y="41">Leafy component (LLM)</text>
    <rect x="712" y="52" width="14" height="14" rx="3" fill="#FBEFDD" stroke="#E0A458"/>
    <text x="732" y="63">Deterministic logic (no LLM)</text>
    <rect x="712" y="74" width="14" height="14" rx="3" fill="#EEF0F1" stroke="#C7CDD2"/>
    <text x="732" y="85">External / infrastructure</text>
  </g>

  <!-- User -->
  <rect x="460" y="98" width="120" height="42" rx="10" fill="#EEF0F1" stroke="#C7CDD2"/>
  <text x="520" y="124" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2421">👤 User</text>

  <!-- Web UI -->
  <rect x="300" y="162" width="440" height="56" rx="12" fill="#E9F2EA" stroke="#2F6B3C"/>
  <text x="520" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#2F6B3C">Leafy Web App</text>
  <text x="520" y="205" text-anchor="middle" font-size="12" fill="#55606A">Proactive "Today" dashboard + Ask Leafy chat · single-page (Tailwind)</text>

  <!-- FastAPI -->
  <rect x="300" y="240" width="440" height="46" rx="12" fill="#FFFFFF" stroke="#C7CDD2"/>
  <text x="520" y="268" text-anchor="middle" font-size="12.5" fill="#1F2421">FastAPI server · serves UI + REST (/api/dashboard, /api/weather) + ADK chat (SSE)</text>

  <!-- Security -->
  <rect x="300" y="306" width="440" height="46" rx="12" fill="#FBEFDD" stroke="#E0A458"/>
  <text x="520" y="325" text-anchor="middle" font-size="12.5" font-weight="600" fill="#B5711E">🛡 Security guardrails — before every model call</text>
  <text x="520" y="343" text-anchor="middle" font-size="11.5" fill="#8a6a2f">prompt-injection screen · image validation · PII redaction</text>

  <!-- Orchestrator -->
  <rect x="322" y="378" width="396" height="58" rx="12" fill="#2F6B3C" stroke="#245230"/>
  <text x="520" y="402" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">🌿 Leafy Orchestrator — Gemini · LlmAgent</text>
  <text x="520" y="421" text-anchor="middle" font-size="12" fill="#CDE4D3">decides which tools to call (model-driven, not a fixed script)</text>

  <!-- spine arrows -->
  <g stroke="#4E8B5B" stroke-width="1.6" fill="none">
    <path d="M520,140 L520,160" marker-end="url(#ar)"/>
    <path d="M520,218 L520,238" marker-end="url(#ar)"/>
    <path d="M520,286 L520,304" marker-end="url(#ar)"/>
    <path d="M520,352 L520,376" marker-end="url(#ar)"/>
  </g>
  <text x="532" y="234" font-size="10.5" fill="#6B7280">HTTP / SSE</text>

  <!-- Data & Tools container -->
  <rect x="60" y="474" width="430" height="196" rx="14" fill="#FFFFFF" stroke="#C7CDD2" stroke-dasharray="4 3"/>
  <text x="80" y="497" font-size="13" font-weight="700" fill="#55606A">Data &amp; Tools</text>
  <g font-size="12">
    <rect x="78" y="508" width="180" height="44" rx="9" fill="#E9F2EA" stroke="#2F6B3C"/>
    <text x="168" y="527" text-anchor="middle" font-weight="600" fill="#1F2421">Catalog + Profile</text>
    <text x="168" y="543" text-anchor="middle" font-size="10.5" fill="#6B7280">SQLite · ground truth</text>

    <rect x="292" y="508" width="180" height="44" rx="9" fill="#E9F2EA" stroke="#2F6B3C"/>
    <text x="382" y="527" text-anchor="middle" font-weight="600" fill="#1F2421">Plant Knowledge Base</text>
    <text x="382" y="543" text-anchor="middle" font-size="10.5" fill="#6B7280">curated JSON</text>

    <rect x="78" y="562" width="180" height="44" rx="9" fill="#E9F2EA" stroke="#2F6B3C"/>
    <text x="168" y="581" text-anchor="middle" font-weight="600" fill="#1F2421">Geocode</text>
    <text x="168" y="597" text-anchor="middle" font-size="10.5" fill="#6B7280">Open-Meteo (keyless)</text>

    <rect x="292" y="562" width="180" height="44" rx="9" fill="#E9F2EA" stroke="#2F6B3C"/>
    <text x="382" y="581" text-anchor="middle" font-weight="600" fill="#1F2421">Weather MCP Server</text>
    <text x="382" y="597" text-anchor="middle" font-size="10.5" fill="#6B7280">FastMCP</text>
  </g>

  <!-- Specialist Reasoning container -->
  <rect x="550" y="474" width="430" height="196" rx="14" fill="#FFFFFF" stroke="#C7CDD2" stroke-dasharray="4 3"/>
  <text x="570" y="497" font-size="13" font-weight="700" fill="#55606A">Specialist reasoning</text>
  <g font-size="12">
    <rect x="568" y="508" width="394" height="44" rx="9" fill="#E9F2EA" stroke="#2F6B3C"/>
    <text x="765" y="527" text-anchor="middle" font-weight="600" fill="#1F2421">Watering Reasoner — sub-agent (AgentTool)</text>
    <text x="765" y="543" text-anchor="middle" font-size="10.5" fill="#6B7280">specialist LLM · structured output</text>

    <rect x="568" y="562" width="192" height="44" rx="9" fill="#FBEFDD" stroke="#E0A458"/>
    <text x="664" y="581" text-anchor="middle" font-weight="600" fill="#1F2421">Shelter Advisor</text>
    <text x="664" y="597" text-anchor="middle" font-size="10.5" fill="#8a6a2f">deterministic ADK graph</text>

    <rect x="770" y="562" width="192" height="44" rx="9" fill="#FBEFDD" stroke="#E0A458"/>
    <text x="866" y="581" text-anchor="middle" font-weight="600" fill="#1F2421">Spot / Light</text>
    <text x="866" y="597" text-anchor="middle" font-size="10.5" fill="#8a6a2f">rules + Gemini vision</text>
  </g>

  <!-- orchestrator to containers -->
  <g stroke="#4E8B5B" stroke-width="1.6" fill="none">
    <path d="M420,436 C300,455 275,455 275,472" marker-end="url(#ar)"/>
    <path d="M620,436 C765,455 765,455 765,472" marker-end="url(#ar)"/>
  </g>

  <!-- external band -->
  <rect x="90" y="712" width="300" height="48" rx="10" fill="#EEF0F1" stroke="#C7CDD2"/>
  <text x="240" y="732" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F2421">Open-Meteo API</text>
  <text x="240" y="748" text-anchor="middle" font-size="11" fill="#6B7280">geocoding + live forecast</text>

  <rect x="410" y="712" width="220" height="48" rx="10" fill="#FFFFFF" stroke="#C7CDD2" stroke-dasharray="4 3"/>
  <text x="520" y="732" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F2421">Evaluation · agents-cli</text>
  <text x="520" y="748" text-anchor="middle" font-size="10.5" fill="#6B7280">traces · LLM-judge · invariants</text>

  <rect x="650" y="712" width="300" height="48" rx="10" fill="#EEF0F1" stroke="#C7CDD2"/>
  <text x="800" y="732" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F2421">Gemini API</text>
  <text x="800" y="748" text-anchor="middle" font-size="11" fill="#6B7280">reasoning + vision</text>

  <!-- external arrows -->
  <g stroke="#9AA4AC" stroke-width="1.4" fill="none" stroke-dasharray="5 3">
    <path d="M275,670 C250,690 240,695 240,710" marker-end="url(#arG)"/>
    <path d="M765,670 C795,690 800,695 800,710" marker-end="url(#arG)"/>
    <path d="M520,436 C900,470 980,560 900,712" marker-end="url(#arG)" opacity="0.5"/>
  </g>
  <text x="905" y="560" font-size="10.5" fill="#9AA4AC">model calls</text>
  <text x="520" y="705" text-anchor="middle" font-size="10.5" fill="#9AA4AC">tests the agent's trajectories</text>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leafy · Plant Care Companion</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232F6B3C'><path d='M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z'/><path d='M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12' fill='none' stroke='%232F6B3C' stroke-width='2'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream:  '#F7F6F1',
        paper:  '#FDFCF9',
        leaf:   { DEFAULT: '#2F6B3C', dark: '#265631', soft: '#E9F0E6', ring: '#4C8A5B' },
        sage:   { DEFAULT: '#A9C0A2', tint: '#F0F4EC', deep: '#7E967A' },
        ink:    { DEFAULT: '#242E22', muted: '#75806F', faint: '#9AA394' },
        amber:  { DEFAULT: '#E0A458', tint: '#FAF0E1' },
        linen:  '#E9E5DA',
      },
      fontFamily: {
        display: ['Fraunces', 'Georgia', 'serif'],
        sans: ['Inter', 'system-ui', 'sans-serif'],
      },
      boxShadow: {
        soft: '0 1px 3px rgba(36,46,34,.05), 0 4px 14px rgba(36,46,34,.05)',
        lift: '0 4px 10px rgba(36,46,34,.07), 0 10px 28px rgba(36,46,34,.09)',
        composer: '0 -6px 24px rgba(36,46,34,.04)',
      },
      borderRadius: { 'xl2': '1.125rem' },
    },
  },
};
</script>
<style>
  html { scrollbar-gutter: stable; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D8D4C7; border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .msg-enter { animation: msgIn .22s cubic-bezier(.21,.8,.4,1) both; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .shimmer { position: relative; overflow: hidden; background: #EFEDE5; }
  .shimmer::after {
    content: ''; position: absolute; inset: 0; transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 100% { transform: translateX(100%); } }

  .typing-dot { width: 6px; height: 6px; border-radius: 9999px; background: #75806F; animation: bounceDot 1.2s infinite ease-in-out; }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounceDot { 0%, 60%, 100% { transform: translateY(0); opacity: .45; } 30% { transform: translateY(-4px); opacity: 1; } }

  .chip-spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card-transition { transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background-color .18s ease; }
  .drawer-transition { transition: transform .24s cubic-bezier(.21,.8,.4,1); }

  #dropOverlay { backdrop-filter: blur(2px); }
  .bubble-md strong { font-weight: 600; }
  .bubble-md ul { list-style: disc; padding-left: 1.15rem; margin: .35rem 0; display: flex; flex-direction: column; gap: .2rem; }
  .bubble-md p + p { margin-top: .5rem; }

  /* Chat panel slide animation */
  .chat-panel-enter { animation: slideInRight .28s cubic-bezier(.21,.8,.4,1) both; }
  @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* Summary stat hover */
  .stat-card { transition: transform .15s ease, box-shadow .15s ease; }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(36,46,34,.1); }
</style>
</head>

<body class="bg-cream font-sans text-ink h-dvh flex flex-col antialiased">

  <!-- ============ Top bar ============ -->
  <header class="shrink-0 px-4 sm:px-6 py-3.5">
    <div class="max-w-[1400px] mx-auto flex items-center justify-between gap-3">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-leaf flex items-center justify-center shadow-soft">
          <i data-lucide="leaf" class="w-5 h-5 text-cream"></i>
        </div>
        <div class="leading-none">
          <div class="font-display font-semibold text-[1.45rem] tracking-tight text-leaf-dark">Leafy</div>
          <div class="text-[11px] text-ink-muted mt-0.5 hidden sm:block">your plant care companion</div>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <!-- Weather / location chip -->
        <div id="locationChip" class="hidden items-center gap-1.5 bg-paper border border-linen rounded-full pl-2.5 pr-3.5 py-1.5 shadow-soft text-sm text-ink-muted">
          <i data-lucide="map-pin" class="w-3.5 h-3.5 text-sage-deep"></i>
          <span id="locationName" class="font-medium text-ink"></span>
        </div>
        <div id="weatherWidget" class="hidden items-center gap-2 bg-paper border border-linen rounded-full px-3 py-1.5 shadow-soft text-xs text-ink-muted sm:text-sm">
          <span id="weatherIconContainer"></span>
          <span id="weatherTemp" class="font-semibold text-ink"></span>
          <span id="weatherCondition" class="text-ink-muted hidden sm:inline"></span>
          <span id="weatherHighLow" class="text-[11px] text-ink-faint hidden md:inline"></span>
          <span class="text-linen">|</span>
          <i data-lucide="map-pin" class="w-3.5 h-3.5 text-sage-deep"></i>
          <span id="locationNameWidget" class="font-medium text-ink"></span>
        </div>
        <!-- Chat toggle -->
        <button id="chatToggle" class="flex items-center gap-1.5 bg-leaf hover:bg-leaf-dark text-cream rounded-full px-3.5 py-1.5 shadow-soft text-sm font-medium transition active:scale-95">
          <i data-lucide="message-circle" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Ask Leafy</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ============ Main ============ -->
  <main class="flex-1 min-h-0 w-full max-w-[1400px] mx-auto flex gap-5 px-4 sm:px-6 pb-4 sm:pb-6">

    <!-- ===== Left: Dashboard (hero) ===== -->
    <section id="dashboardPanel" class="flex-1 min-w-0 flex flex-col gap-5 overflow-y-auto">

      <!-- Summary strip -->
      <div id="summaryStrip" class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <!-- Populated by JS -->
      </div>

      <!-- Plant cards heading -->
      <div class="flex items-center justify-between">
        <h2 class="font-display font-semibold text-lg text-leaf-dark flex items-center gap-2">
          <i data-lucide="sprout" class="w-[18px] h-[18px] text-leaf"></i>
          My Plants
        </h2>
        <span id="plantCount" class="text-xs font-medium text-ink-muted bg-sage-tint border border-linen rounded-full px-2.5 py-1 hidden"></span>
      </div>

      <!-- Plant cards grid -->
      <div id="plantList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-4">
        <!-- Populated by JS -->
      </div>
    </section>

    <!-- ===== Right: Chat panel (collapsible) ===== -->
    <aside id="chatPanel" class="hidden flex-col w-[38%] max-w-[480px] shrink-0 bg-paper border border-linen rounded-2xl shadow-soft overflow-hidden relative">

      <!-- Chat header -->
      <div class="px-4 pt-4 pb-3 flex items-center justify-between border-b border-linen/50">
        <div class="flex items-center gap-2">
          <div class="w-7 h-7 rounded-full bg-leaf-soft border border-linen flex items-center justify-center">
            <i data-lucide="leaf" class="w-3.5 h-3.5 text-leaf"></i>
          </div>
          <span class="font-display font-semibold text-[15px] text-leaf-dark">Ask Leafy</span>
        </div>
        <button id="chatClose" class="w-7 h-7 rounded-full hover:bg-sage-tint flex items-center justify-center transition lg:hidden">
          <i data-lucide="x" class="w-4 h-4 text-ink-muted"></i>
        </button>
      </div>

      <!-- drag-and-drop overlay -->
      <div id="dropOverlay" class="absolute inset-2 z-20 hidden items-center justify-center rounded-xl2 border-2 border-dashed border-leaf bg-leaf-soft/80 pointer-events-none">
        <div class="flex flex-col items-center gap-2 text-leaf-dark">
          <i data-lucide="image-plus" class="w-9 h-9"></i>
          <div class="font-medium">Drop your photo here</div>
        </div>
      </div>

      <!-- messages -->
      <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-4"></div>

      <!-- typing indicator -->
      <div id="typing" class="hidden px-4 pb-1">
        <div class="flex items-end gap-2.5">
          <div class="w-7 h-7 rounded-full bg-leaf-soft border border-linen flex items-center justify-center shrink-0">
            <i data-lucide="leaf" class="w-3.5 h-3.5 text-leaf"></i>
          </div>
          <div class="bg-sage-tint border border-linen rounded-2xl rounded-bl-md px-4 py-3 flex gap-1.5 items-center">
            <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
          </div>
        </div>
      </div>

      <!-- quick actions + composer -->
      <div class="shrink-0 border-t border-linen bg-paper shadow-composer px-3 pt-2.5 pb-3">
        <div id="quickActions" class="flex gap-2 overflow-x-auto pb-2 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
          <button data-qa="add" class="qa-pill"><i data-lucide="plus" class="w-3.5 h-3.5"></i>Add a plant</button>
          <button data-qa="water" class="qa-pill"><i data-lucide="droplet" class="w-3.5 h-3.5"></i>When to water</button>
          <button data-qa="move" class="qa-pill"><i data-lucide="cloud-sun" class="w-3.5 h-3.5"></i>Move today?</button>
          <button data-qa="spot" class="qa-pill"><i data-lucide="camera" class="w-3.5 h-3.5"></i>Spot check</button>
        </div>

        <!-- image preview -->
        <div id="imagePreview" class="hidden mb-2">
          <div class="inline-flex items-center gap-2.5 bg-sage-tint border border-linen rounded-xl p-1.5 pr-3">
            <img id="previewImg" class="w-12 h-12 rounded-lg object-cover" alt="attached photo" />
            <span class="text-xs text-ink-muted font-medium">Photo attached</span>
            <button id="removeImage" class="w-5 h-5 rounded-full bg-ink/10 hover:bg-ink/20 flex items-center justify-center transition">
              <i data-lucide="x" class="w-3 h-3 text-ink"></i>
            </button>
          </div>
        </div>

        <form id="composer" class="flex items-end gap-2">
          <input type="file" id="fileInput" accept="image/*" class="hidden" />
          <button type="button" id="attachBtn" title="Attach a photo"
                  class="shrink-0 w-10 h-10 rounded-full border border-linen bg-paper hover:bg-sage-tint text-ink-muted hover:text-leaf-dark flex items-center justify-center transition active:scale-95">
            <i data-lucide="camera" class="w-4.5 h-4.5 w-5 h-5"></i>
          </button>
          <div class="flex-1 bg-cream border border-linen rounded-3xl focus-within:border-leaf-ring focus-within:ring-2 focus-within:ring-leaf-ring/20 transition flex items-center">
            <textarea id="input" rows="1" placeholder="Ask Leafy…"
                      class="flex-1 bg-transparent resize-none outline-none text-[15px] placeholder:text-ink-faint px-4 py-2.5 max-h-36"></textarea>
          </div>
          <button type="submit" id="sendBtn" title="Send"
                  class="shrink-0 w-10 h-10 rounded-full bg-leaf hover:bg-leaf-dark text-cream flex items-center justify-center transition active:scale-95 disabled:opacity-40 disabled:pointer-events-none shadow-soft">
            <i data-lucide="send" class="w-[18px] h-[18px] -ml-0.5 mt-0.5"></i>
          </button>
        </form>
      </div>
    </aside>
  </main>

  <!-- Mobile chat backdrop -->
  <div id="chatBackdrop" class="fixed inset-0 bg-ink/25 z-30 hidden"></div>

  <style>
    .qa-pill {
      display: inline-flex; align-items: center; gap: .4rem; white-space: nowrap;
      font-size: .8rem; font-weight: 500; color: #2F6B3C;
      background: #E9F0E6; border: 1px solid #d9e3d4; border-radius: 9999px;
      padding: .42rem .85rem; transition: all .16s ease;
    }
    .qa-pill:hover { background: #dce8d6; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(47,107,60,.12); }
    .qa-pill:active { transform: scale(.97); }

    .pill {
      display: inline-flex; align-items: center; gap: .3rem; white-space: nowrap;
      font-size: .68rem; font-weight: 500; color: #75806F;
      background: #F7F6F1; border: 1px solid #E9E5DA; border-radius: 9999px;
      padding: .22rem .55rem; line-height: 1.1; max-width: 100%;
    }
    .pill i, .pill svg { flex-shrink: 0; }

    .status-chip {
      display: inline-flex; align-items: center; gap: .35rem; white-space: nowrap;
      font-size: .75rem; font-weight: 500; border-radius: 9999px;
      padding: .3rem .7rem; line-height: 1.2;
    }
    .status-chip i, .status-chip svg { flex-shrink: 0; }
  </style>

  <!-- ============ Custom Delete Confirmation Dialog ============ -->
  <div id="deleteConfirmDialog" class="fixed inset-0 z-50 hidden items-center justify-center bg-ink/30 backdrop-blur-[2px] transition-opacity duration-200">
    <div class="bg-paper border border-linen rounded-xl2 max-w-sm w-full mx-4 p-5 shadow-lift">
      <div class="flex items-center gap-3 text-amber mb-3">
        <div class="w-10 h-10 rounded-full bg-amber-tint flex items-center justify-center">
          <i data-lucide="alert-triangle" class="w-5 h-5 text-amber"></i>
        </div>
        <h3 class="font-display font-semibold text-lg text-leaf-dark">Delete Plant</h3>
      </div>
      <p id="deleteConfirmText" class="text-sm text-ink-muted leading-relaxed mb-5"></p>
      <div class="flex items-center justify-end gap-2.5">
        <button id="deleteCancelBtn" class="px-4 py-2 text-xs font-semibold bg-cream hover:bg-linen/50 text-ink rounded-full border border-linen/80 transition active:scale-95">
          Cancel
        </button>
        <button id="deleteConfirmBtn" class="px-4 py-2 text-xs font-semibold bg-amber hover:bg-amber/90 text-cream rounded-full shadow-soft transition active:scale-95">
          Delete
        </button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
